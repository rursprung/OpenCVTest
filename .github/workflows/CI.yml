name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:

env:
  BUILD_TYPE: Debug 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Cache vcpkg
      uses: actions/cache@v3
      with:
        key: ${{ hashFiles('vcpkg.json') }}
        path: |
          ${{github.workspace}}/vcpkg
          ~/.cache
    - name: Checkout vcpkg
      uses: actions/checkout@v3
      with:
        repository: Microsoft/vcpkg
        path: ${{github.workspace}}/vcpkg
    - name: Bootstrap vcpkg
      run: ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh -disableMetrics
    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/vcpkg/scripts/buildsystems/vcpkg.cmake
    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/vcpkg/scripts/buildsystems/vcpkg.cmake
